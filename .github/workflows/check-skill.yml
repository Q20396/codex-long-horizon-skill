name: Check skill package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate package structure
        run: python3 .agents/skills/long-horizon-engineering/scripts/check_skill_package.py

      - name: Check helper command help
        run: |
          python3 .agents/skills/long-horizon-engineering/scripts/check_skill_package.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/check_for_updates.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/append_project_memory.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/update_task_log.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/github_skill_scan.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/scan_top_related_skills.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/doctor.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/audit_skill_descriptions.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/audit_external_skill_candidate.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/audit_skill_safety.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/manage_skill_lifecycle.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/score_skill_candidate.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/update_installed_skill.py --help
          python3 .agents/skills/long-horizon-engineering/scripts/test_expected_triggers.py --help
          python3 .agents/skills/ai-video-production/scripts/scan_top_media_skills.py --help

      - name: Run productized package checks
        run: |
          python3 .agents/skills/long-horizon-engineering/scripts/doctor.py
          python3 .agents/skills/long-horizon-engineering/scripts/audit_skill_descriptions.py
          python3 .agents/skills/long-horizon-engineering/scripts/audit_skill_safety.py
          python3 .agents/skills/long-horizon-engineering/scripts/score_skill_candidate.py --fail-on-regression
          python3 .agents/skills/long-horizon-engineering/scripts/manage_skill_lifecycle.py list
          python3 .agents/skills/long-horizon-engineering/scripts/manage_skill_lifecycle.py suggest-freeze --include-never-used
          python3 .agents/skills/long-horizon-engineering/scripts/test_expected_triggers.py
          python3 .agents/skills/long-horizon-engineering/scripts/update_installed_skill.py --list-skills

      - name: Compile Python helper scripts
        run: |
          scripts_to_compile="
          .agents/skills/long-horizon-engineering/scripts/doctor.py
          .agents/skills/long-horizon-engineering/scripts/update_installed_skill.py
          .agents/skills/long-horizon-engineering/scripts/test_expected_triggers.py
          .agents/skills/long-horizon-engineering/scripts/check_skill_package.py
          .agents/skills/long-horizon-engineering/scripts/audit_skill_descriptions.py
          scripts/full_skill_validation.py
          "
          if [ -f .agents/skills/long-horizon-engineering/scripts/audit_skill_optimization_readiness.py ]; then
            scripts_to_compile="$scripts_to_compile .agents/skills/long-horizon-engineering/scripts/audit_skill_optimization_readiness.py"
          fi
          if [ -f .agents/skills/long-horizon-engineering/scripts/enable_disaster_monitoring.py ]; then
            scripts_to_compile="$scripts_to_compile .agents/skills/long-horizon-engineering/scripts/enable_disaster_monitoring.py"
          fi
          PYTHONPYCACHEPREFIX=/tmp/codex-pycache python3 -m py_compile $scripts_to_compile

      - name: Check whitespace in diff
        run: git diff --check

      - name: Smoke test update dry-run
        run: |
          rm -rf /tmp/codex-skill-ci-dry-run
          mkdir -p /tmp/codex-skill-ci-dry-run
          python3 .agents/skills/long-horizon-engineering/scripts/update_installed_skill.py \
            --target-root /tmp/codex-skill-ci-dry-run \
            --skill long-horizon-engineering
          python3 .agents/skills/long-horizon-engineering/scripts/update_installed_skill.py \
            --target-root /tmp/codex-skill-ci-dry-run \
            --skill ai-video-production
